<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Expense Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 50px 1rem; }
    .box { background: #fff; border-radius: 14px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); width: 100%; max-width: 420px; padding: 1.8rem; }
    h2 { font-size: 1.2rem; color: #111; margin-bottom: 1.5rem; }

    /* Summary */
    .summary { display: flex; justify-content: space-between; margin-bottom: 1.5rem; }
    .summary-item { text-align: center; }
    .summary-item span { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; margin-bottom: 0.25rem; }
    .summary-item strong { font-size: 1.2rem; color: #111; }
    #total-income { color: #22c55e; }
    #total-expense { color: #ef4444; }
    #balance { color: #111; }

    /* Form */
    .form { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }
    input, select { padding: 0.6rem 0.8rem; border: 1.5px solid #e5e5e5; border-radius: 8px; font-size: 0.9rem; outline: none; width: 100%; }
    input:focus, select:focus { border-color: #aaa; }
    .form-row { display: flex; gap: 0.6rem; }
    .form-row input, .form-row select { flex: 1; }
    button#add-btn { padding: 0.65rem; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
    button#add-btn:hover { background: #333; }

    /* List */
    .list-header { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; margin-bottom: 0.6rem; }
    #expense-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .expense-item { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 0.9rem; background: #fafafa; border-radius: 8px; border: 1.5px solid #f0f0f0; }
    .item-left { display: flex; flex-direction: column; gap: 0.15rem; }
    .item-name { font-size: 0.9rem; color: #222; }
    .item-category { font-size: 0.72rem; color: #aaa; }
    .item-right { display: flex; align-items: center; gap: 0.75rem; }
    .item-amount { font-size: 0.95rem; font-weight: 600; }
    .item-amount.income { color: #22c55e; }
    .item-amount.expense { color: #ef4444; }
    .delete-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 1rem; line-height: 1; }
    .delete-btn:hover { color: #ef4444; }
    .empty { font-size: 0.85rem; color: #bbb; text-align: center; padding: 1.5rem 0; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Expense Tracker</h2>

    <!-- Summary -->
    <div class="summary">
      <div class="summary-item">
        <span>Income</span>
        <strong id="total-income">$0.00</strong>
      </div>
      <div class="summary-item">
        <span>Expenses</span>
        <strong id="total-expense">$0.00</strong>
      </div>
      <div class="summary-item">
        <span>Balance</span>
        <strong id="balance">$0.00</strong>
      </div>
    </div>

    <!-- Form -->
    <div class="form">
      <input type="text" id="desc-input" placeholder="Description"/>
      <div class="form-row">
        <input type="number" id="amount-input" placeholder="Amount" min="0" step="0.01"/>
        <select id="type-select">
          <option value="Expense">Expense</option>
          <option value="Income">Income</option>
        </select>
      </div>
      <input type="text" id="category-input" placeholder="Category (e.g. Food, Rent…)"/>
      <button id="add-btn">Add Entry</button>
    </div>

    <!-- List -->
    <p class="list-header">Entries</p>
    <ul id="expense-list">
      <li class="empty">No entries yet.</li>
    </ul>
  </div>

  <script src="Expense Tracker.js">
    // IDs ready for your JS:
    // Inputs:   #desc-input, #amount-input, #type-select, #category-input
    // Button:   #add-btn
    // Summary:  #total-income, #total-expense, #balance
    // List:     #expense-list
    //
    // Each list item should have class 'expense-item', with:
    //   .item-amount.income or .item-amount.expense for color
    //   .delete-btn to remove the entry
  </script>
</body>
</html>
